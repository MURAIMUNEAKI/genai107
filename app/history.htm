<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>利用履歴 - 源内AI</title>
<link rel="icon" type="image/x-icon" href="../images/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/dads107.css">
<style>
.history-header{border-bottom:1px solid var(--solid-gray-300);padding:1.5rem 0 1rem;margin-bottom:1.5rem;}
.history-title{font-size:1.5rem;font-weight:700;line-height:1.5;margin:0 0 0.25rem;}
.history-subtitle{font-size:0.875rem;line-height:1.7;color:var(--solid-gray-600);margin:0;}

.history-empty{text-align:center;color:var(--solid-gray-536);padding:3rem 0;font-size:1rem;}

.history-group{margin-bottom:1.5rem;}
.history-date{font-size:0.875rem;font-weight:700;color:var(--solid-gray-536);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.03em;}

.history-item{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;border:1px solid var(--solid-gray-300);border-radius:8px;margin-bottom:0.5rem;cursor:pointer;text-decoration:none;color:inherit;transition:background 0.15s;}
.history-item:hover{background:var(--solid-gray-50);}
.history-item-icon{width:2rem;height:2rem;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--solid-gray-100);color:var(--solid-gray-600);}
.history-item-icon svg{width:1rem;height:1rem;}
.history-item-body{flex:1;min-width:0;}
.history-item-title{font-size:0.9375rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:underline;text-underline-offset:3px;}
.history-item:hover .history-item-title{text-decoration-thickness:2px;}
.history-item-meta{font-size:0.75rem;color:var(--solid-gray-536);margin-top:0.125rem;}
.history-item-delete{flex-shrink:0;background:none;border:none;cursor:pointer;color:var(--solid-gray-420);padding:0.25rem;border-radius:4px;font-size:1rem;line-height:1;}
.history-item-delete:hover{background:var(--solid-gray-100);color:var(--error-1);}

.history-clear-area{text-align:center;margin-top:1.5rem;}
</style>
</head>
<body>
<script src="../shared/auth.js"></script>
<script>checkAuth();</script>

<div class="app-shell">
  <main class="app-main">
    <div class="main-content" style="max-width:64rem">
      <div class="history-header">
        <h1 class="history-title">利用履歴</h1>
        <p class="history-subtitle">過去のAI利用履歴を確認・再開できます（ブラウザに保存、7日間保持）</p>
      </div>

      <div id="historyContainer">
        <div class="history-empty" id="emptyMsg">読み込み中...</div>
      </div>

      <div class="history-clear-area" id="clearArea" style="display:none">
        <button class="dads-btn-outline" id="clearAllBtn" style="min-width:auto;padding:0.5rem 1.5rem;">すべての履歴を削除</button>
      </div>
    </div>
  </main>
</div>

<script src="../shared/layout107.js"></script>
<script src="../shared/history-store.js"></script>
<script>
initLayout({ activePage: 'history', basePath: '' });

var container = document.getElementById('historyContainer');
var emptyMsg = document.getElementById('emptyMsg');
var clearArea = document.getElementById('clearArea');
var clearAllBtn = document.getElementById('clearAllBtn');

var APP_ICONS = {
  chat:       '<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>',
  generate:   '<path d="M17 3a2.83 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>',
  translate:  '<circle cx="12" cy="12" r="10"/><path d="M2 12h20"/>',
  image:      '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>',
  diagram:    '<rect x="8" y="2" width="8" height="4" rx="1"/><rect x="2" y="18" width="8" height="4" rx="1"/><rect x="14" y="18" width="8" height="4" rx="1"/><path d="M12 6v6M12 12H6v6M12 12h6v6"/>',
  transcribe: '<path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/>'
};

var APP_LABELS = {
  chat: 'チャット',
  generate: '文章生成',
  translate: '翻訳',
  image: '画像生成',
  diagram: 'ダイアグラム',
  transcribe: '文字起こし'
};

var APP_PAGES = {
  chat: 'chat.htm',
  generate: 'generate.htm',
  translate: 'translate.htm',
  image: 'image.htm',
  diagram: 'diagram.htm',
  transcribe: 'transcribe.htm'
};

function loadHistory() {
  HistoryStore.loadAll().then(function(items) {
    // 7日以上前の履歴は除外
    var cutoff = Date.now() - 7 * 24 * 60 * 60 * 1000;
    items = items.filter(function(item) { return (item.updatedAt || 0) > cutoff; });

    if (!items.length) {
      emptyMsg.textContent = '利用履歴はまだありません';
      clearArea.style.display = 'none';
      return;
    }

    emptyMsg.style.display = 'none';
    clearArea.style.display = 'block';

    // 日別にグループ化
    var groups = {};
    items.forEach(function(item) {
      var d = new Date(item.updatedAt);
      var key = d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate();
      if (!groups[key]) groups[key] = [];
      groups[key].push(item);
    });

    container.innerHTML = '';
    Object.keys(groups).forEach(function(dateKey) {
      var group = document.createElement('div');
      group.className = 'history-group';

      var dateLabel = document.createElement('div');
      dateLabel.className = 'history-date';
      dateLabel.textContent = dateKey;
      group.appendChild(dateLabel);

      groups[dateKey].forEach(function(item) {
        var appType = item.appType || 'chat';
        var page = APP_PAGES[appType] || 'chat.htm';
        var href = page + '?id=' + encodeURIComponent(item.id);

        var el = document.createElement('a');
        el.className = 'history-item';
        el.href = href;

        var iconPath = APP_ICONS[appType] || APP_ICONS.chat;
        var time = new Date(item.updatedAt);
        var timeStr = ('0' + time.getHours()).slice(-2) + ':' + ('0' + time.getMinutes()).slice(-2);

        el.innerHTML =
          '<div class="history-item-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' + iconPath + '</svg></div>' +
          '<div class="history-item-body">' +
            '<div class="history-item-title">' + escapeHtml(item.title || '無題') + '</div>' +
            '<div class="history-item-meta">' + escapeHtml(APP_LABELS[appType] || appType) + ' / ' + timeStr + '</div>' +
          '</div>';

        var delBtn = document.createElement('button');
        delBtn.className = 'history-item-delete';
        delBtn.title = '削除';
        delBtn.innerHTML = '&times;';
        delBtn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          if (confirm('この履歴を削除しますか？')) {
            HistoryStore.remove(item.id).then(function() { loadHistory(); });
          }
        });
        el.appendChild(delBtn);

        group.appendChild(el);
      });

      container.appendChild(group);
    });
  });
}

clearAllBtn.addEventListener('click', function() {
  if (!confirm('すべての履歴を削除しますか？この操作は取り消せません。')) return;
  HistoryStore.loadAll().then(function(items) {
    var promises = items.map(function(item) { return HistoryStore.remove(item.id); });
    Promise.all(promises).then(function() {
      loadHistory();
    });
  });
});

function escapeHtml(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

loadHistory();
</script>
</body>
</html>
