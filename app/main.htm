<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>源内AI - ホーム</title>
<link rel="icon" type="image/x-icon" href="../images/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/dads107.css">
<style>
.landing-hero{text-align:center;padding:3rem 0 2rem;}
.landing-hero h1{font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;}
@media(min-width:768px){.landing-hero h1{font-size:2rem;}}
.landing-hero p{font-size:1rem;color:var(--solid-gray-600);margin-bottom:1.5rem;}

/* Chat input on landing */
.landing-chat-form{max-width:40rem;margin:0 auto 2.5rem;display:flex;gap:0.5rem;}
.landing-chat-input{flex:1;border-radius:9999px;border:1px solid var(--solid-gray-420);padding:0.75rem 1.25rem;font-size:1rem;font-family:inherit;height:3rem;}
.landing-chat-input:focus{outline:4px solid #000;outline-offset:2px;box-shadow:0 0 0 2px var(--yellow-300);}
.landing-chat-btn{min-width:3rem;height:3rem;border-radius:50%;background:var(--blue-900);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.landing-chat-btn:hover{background:var(--blue-1000);}

.section-title{font-size:1.25rem;font-weight:700;margin-bottom:1rem;}
.all-apps-link{display:block;text-align:center;margin-top:2rem;font-size:1.125rem;font-weight:700;color:var(--blue-900);text-decoration:underline;text-underline-offset:4px;}
</style>
</head>
<body>
<script src="../shared/auth.js"></script>
<script>checkAuth();</script>
<script>navigator.sendBeacon('../log/count.php',new URLSearchParams({app:'main'}));</script>

<div class="app-shell">
  <main class="app-main">
    <div class="main-content" style="max-width:72rem">

      <div class="landing-hero">
        <h1>ガバメントAIへようこそ</h1>
        <p>何でもお聞きください。AIがお手伝いします。</p>
      </div>

      <form class="landing-chat-form" id="landingForm" onsubmit="return false">
        <input type="text" class="landing-chat-input" id="landingInput" placeholder="AIに質問する..." autocomplete="off">
        <button type="submit" class="landing-chat-btn" id="landingBtn" title="チャットへ">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </form>

      <h2 class="section-title">おすすめ</h2>
      <div class="card-grid" id="cardGrid"></div>

      <a href="apps.htm" class="all-apps-link">すべてのAIアプリを見る</a>

      <div class="page-footer">
        注意: AIの出力は必ずしも正確ではありません。重要な情報は必ずご自身で確認してください。
      </div>
    </div>
  </main>
</div>

<script src="../shared/layout107.js"></script>
<script>
initLayout({ activePage: 'main', basePath: '' });

/* Landing chat → chat.htm with query */
document.getElementById('landingForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var q = document.getElementById('landingInput').value.trim();
  if (q) window.location.href = 'chat.htm?q=' + encodeURIComponent(q);
});
document.getElementById('landingBtn').addEventListener('click', function() {
  var q = document.getElementById('landingInput').value.trim();
  if (q) window.location.href = 'chat.htm?q=' + encodeURIComponent(q);
});

/* Card grid */
var cardIcons = {
  chat:       '<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>',
  generate:   '<path d="M17 3a2.83 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>',
  translate:  '<circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10A15.3 15.3 0 0112 2z"/>',
  image:      '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>',
  diagram:    '<rect x="8" y="2" width="8" height="4" rx="1"/><rect x="2" y="18" width="8" height="4" rx="1"/><rect x="14" y="18" width="8" height="4" rx="1"/><path d="M12 6v6M12 12H6v6M12 12h6v6"/>',
  transcribe: '<path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>',
  rag:        '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><path d="M11 8v6M8 11h6"/>',
  lawsy:      '<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>'
};
var cards = [
  { id: 'chat',       title: 'チャット',               desc: 'AIと対話しながらアイデアを整理・深掘り', href: 'chat.htm' },
  { id: 'generate',   title: '文章を生成',             desc: '要点を入力するだけで業務文書を自動作成', href: 'generate.htm' },
  { id: 'translate',  title: '翻訳',                   desc: '日本語⇔多言語の高精度な翻訳を即座に実行', href: 'translate.htm' },
  { id: 'image',      title: '画像を生成',             desc: 'テキストの指示からイラスト・画像を生成', href: 'image.htm' },
  { id: 'diagram',    title: 'ダイアグラムを生成',     desc: 'テキストからフローチャート等の図を作成', href: 'diagram.htm' },
  { id: 'transcribe', title: '文字起こし',             desc: '音声ファイルをアップロードしてテキスト化', href: 'transcribe.htm' },
  { id: 'rag',        title: '行政実務用RAG',          desc: '独自の知識ベースからAIが的確に回答', href: 'rag.htm' },
  { id: 'lawsy',      title: '法令AI Lawsy',           desc: '法令条文を横断検索しAIが根拠付きで回答', href: 'lawsy.htm' }
];

var grid = document.getElementById('cardGrid');
for (var i = 0; i < cards.length; i++) {
  var c = cards[i];
  var el = document.createElement('a');
  el.className = 'card';
  el.href = c.href;
  var iconSvg = cardIcons[c.id] ? '<svg style="flex-shrink:0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + cardIcons[c.id] + '</svg>' : '';
  el.innerHTML = '<div class="card-title">' + iconSvg + c.title + '</div><div class="card-desc">' + c.desc + '</div>';
  grid.appendChild(el);
}
</script>
</body>
</html>
