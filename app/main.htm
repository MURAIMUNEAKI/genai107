.landing-hero{text-align:center;padding:0.5rem 0 0.5rem;}
.landing-hero h1{font-size:1.5rem;font-weight:700;margin-bottom:0.25rem;}
@media(min-width:768px){.landing-hero h1{font-size:2rem;}}
.landing-hero p{font-size:1rem;color:var(--solid-gray-600);margin-bottom:0.5rem;}

/* Chat input on landing */
.landing-chat-form{max-width:40rem;margin:0 auto 1.5rem;display:flex;gap:0.5rem;padding:0 1rem;box-sizing:border-box;}
.landing-chat-input{flex:1;min-width:0;border-radius:9999px;border:1px solid var(--solid-gray-420);padding:0.75rem 1.25rem;font-size:1rem;font-family:inherit;height:3rem;box-sizing:border-box;}
.landing-chat-input:focus{outline:4px solid #000;outline-offset:2px;box-shadow:0 0 0 2px var(--yellow-300);}
.landing-chat-btn{min-width:3rem;height:3rem;border-radius:50%;background:var(--blue-900);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.landing-chat-btn:hover{background:var(--blue-1000);}

.section-title{font-size:1.25rem;font-weight:700;margin-bottom:1rem;}

/* iframe overlay */
#iframeOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:#fff;}
#iframeOverlay.active{display:block;}
#iframeOverlay iframe{width:100%;height:100%;border:none;}
#backToMenu{position:fixed;top:8px;left:8px;z-index:10000;background:#ffd700;color:#000;border:2px solid #000;padding:6px 16px;font-size:0.85rem;font-weight:700;cursor:pointer;border-radius:4px;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
#backToMenu:hover{background:#ffe44d;}
</style>

      </div>
    </div>
  </main>

function renderCards(list, gridEl, useIframe) {
  for (var i = 0; i < list.length; i++) {
    var c = list[i];
    var el = document.createElement('a');
    el.className = 'card';
    var iconSvg = cardIcons[c.id] ? '<svg style="flex-shrink:0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + cardIcons[c.id] + '</svg>' : '';
    el.innerHTML = '<div class="card-title">' + iconSvg + c.title + '</div><div class="card-desc">' + c.desc + '</div>';
    if (useIframe && !c.direct) {
      el.href = '#';
      el.onclick = (function(url) { return function(e) { e.preventDefault(); openApp(url); }; })(c.href);
    } else {
      el.href = c.href;
    }
    gridEl.appendChild(el);
  }
}
function openApp(url) {
  document.getElementById('appFrame').src = url;
  document.getElementById('iframeOverlay').classList.add('active');
}
function closeApp() {
  document.getElementById('iframeOverlay').classList.remove('active');
  document.getElementById('appFrame').src = '';
}
