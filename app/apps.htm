function renderCards(list, gridEl) {
  for (var i = 0; i < list.length; i++) {
    var c = list[i];
    var el = document.createElement('a');
    el.className = 'card';
    el.style.cursor = 'pointer';
    // href は付けない（左下のステータスバーにURLを出さないため）。onclick で遷移する。
    el.onclick = (function (href) { return function () { location.href = href; }; })(c.href);
    var iconSvg = cardIcons[c.id] ? '<svg style="flex-shrink:0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + cardIcons[c.id] + '</svg>' : '';
    el.innerHTML = '<div class="card-title">' + iconSvg + c.title + '</div><div class="card-desc">' + c.desc + '</div>';
    gridEl.appendChild(el);
  }
}

// ヘッダーのボタンから #sec-... で指定されたセクションへスクロール
// （スクロールは window ではなく .app-main コンテナ内で起きるため scrollIntoView を使う）
function scrollToHashSection() {
  if (!location.hash) return;
  var target = document.getElementById(location.hash.slice(1));
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
scrollToHashSection();
window.addEventListener('hashchange', scrollToHashSection);
