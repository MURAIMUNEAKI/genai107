<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIアプリ - 源内AI</title>
<link rel="icon" type="image/x-icon" href="../images/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/dads107.css">
<style>
.apps-header{border-bottom:1px solid var(--solid-gray-300);padding:1.5rem 0 1rem;margin-bottom:1.5rem;}
.apps-title{font-size:1.5rem;font-weight:700;line-height:1.5;margin:0 0 0.25rem;}
.apps-subtitle{font-size:0.875rem;line-height:1.7;color:var(--solid-gray-600);margin:0;}
</style>
</head>
<body>
<script src="../shared/auth.js"></script>
<script>checkAuth();</script>
<script>navigator.sendBeacon('../log/count.php',new URLSearchParams({app:'main'}));</script>

<div class="app-shell">
  <main class="app-main">
    <div class="main-content" style="max-width:72rem">
      <div class="apps-header">
        <h1 class="apps-title">AIアプリ</h1>
        <p class="apps-subtitle">業務に活用できるAIアプリの一覧です</p>
      </div>

      <div class="card-grid" id="cardGrid"></div>

      <div class="page-footer">
        注意: AIの出力は必ずしも正確ではありません。重要な情報は必ずご自身で確認してください。
      </div>
    </div>
  </main>
</div>

<script src="../shared/layout107.js"></script>
<script>
initLayout({ activePage: 'apps', basePath: '' });

var cardIcons = {
  chat:       '<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>',
  generate:   '<path d="M17 3a2.83 2.83 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>',
  translate:  '<circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10A15.3 15.3 0 0112 2z"/>',
  image:      '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>',
  diagram:    '<rect x="8" y="2" width="8" height="4" rx="1"/><rect x="2" y="18" width="8" height="4" rx="1"/><rect x="14" y="18" width="8" height="4" rx="1"/><path d="M12 6v6M12 12H6v6M12 12h6v6"/>',
  transcribe: '<path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>'
};

var cards = [
  { id: 'chat',       title: 'チャット',               desc: 'AIと対話しながらアイデアを整理・深掘りできます。ファイルの添付やシステムプロンプトの設定も可能です。', href: 'chat.htm' },
  { id: 'generate',   title: '文章を生成',             desc: '要点を入力するだけで、ビジネスメールや報告書などの業務文書を自動作成します。', href: 'generate.htm' },
  { id: 'translate',  title: '翻訳',                   desc: '日本語⇔英語・中国語・韓国語・フランス語・スペイン語・ドイツ語の高精度な翻訳を即座に実行します。', href: 'translate.htm' },
  { id: 'image',      title: '画像を生成',             desc: 'テキストの指示からイラスト・画像を生成します。14種のスタイルプリセットに対応。', href: 'image.htm' },
  { id: 'diagram',    title: 'ダイアグラムを生成',     desc: 'テキストからフローチャート・組織図・ER図など22種類の図を作成します。', href: 'diagram.htm' },
  { id: 'transcribe', title: '文字起こし',             desc: '音声ファイルをアップロードして文字起こしを行います。話者認識にも対応。', href: 'transcribe.htm' }
];

var grid = document.getElementById('cardGrid');
for (var i = 0; i < cards.length; i++) {
  var c = cards[i];
  var el = document.createElement('a');
  el.className = 'card';
  el.href = c.href;
  var iconSvg = cardIcons[c.id] ? '<svg style="flex-shrink:0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + cardIcons[c.id] + '</svg>' : '';
  el.innerHTML = '<div class="card-title">' + iconSvg + c.title + '</div><div class="card-desc">' + c.desc + '</div>';
  grid.appendChild(el);
}
</script>
</body>
</html>
