<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="icon" href="../images/favicon.ico" type="image/x-icon">
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中学校学習指導要領 テキストダウンロード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:#1a1a2e;color:#333;line-height:1.6;min-height:100vh;}

.header{background:linear-gradient(to right,#3a8a9c 0%,#53b5ca 40%,#7dcfb6 75%,#a8e6a3 100%);color:#fff;padding:12px 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.3);gap:12px;}
.header-left{text-align:center;flex:1;}
.header h1{font-size:1.4rem;font-weight:900;letter-spacing:0.08em;text-shadow:0 2px 8px rgba(0,0,0,0.3);}
.header p{font-size:0.78rem;opacity:0.8;margin-top:2px;font-weight:400;}

.container{max-width:1100px;margin:0 auto;padding:20px 16px 30px;}

.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}

.card{background:rgba(255,255,255,0.95);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(83,52,131,0.25);background:#fff;}
.card-number{font-size:0.7rem;color:#888;font-weight:600;background:#f0f0f5;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:6px;width:fit-content;}
.card-title{font-size:1.05rem;font-weight:900;color:#1a1a2e;margin-bottom:3px;}
.card-desc{font-size:0.72rem;color:#999;margin-bottom:10px;flex-grow:1;}

.btn-download{display:block;text-align:center;text-decoration:none;padding:9px 12px;border:none;border-radius:8px;font-size:0.82rem;font-weight:700;background:linear-gradient(135deg,#0f3460,#533483);color:#fff;transition:all 0.2s;cursor:pointer;font-family:'Noto Sans JP',sans-serif;box-shadow:0 2px 8px rgba(83,52,131,0.2);}
.btn-download:hover{box-shadow:0 4px 14px rgba(83,52,131,0.4);transform:translateY(-1px);background:linear-gradient(135deg,#0f3460,#533483,#e94560);}

.footer{text-align:center;padding:16px;color:rgba(255,255,255,0.4);font-size:0.72rem;margin-top:8px;}

@media(max-width:700px){
  .header h1{font-size:1.15rem;}
  .subject-grid{grid-template-columns:repeat(2,1fr);gap:6px;}
  .card{padding:10px 12px;}
  .card-title{font-size:0.92rem;}
}
</style>
</head>

<div class="header">

</html>
