<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">

<link rel="icon" href="../images/favicon.ico" type="image/x-icon">
<title>問題と解答の作成</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;}
body{font-family:'Noto Sans JP',sans-serif;background:#1a1a2e;color:#333;line-height:1.6;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body>:not(.header):not(.main):not(.retry-modal):not(script){position:absolute;width:0;height:0;overflow:hidden;}

.header{background:linear-gradient(to right,#3a8a9c 0%,#53b5ca 40%,#7dcfb6 75%,#a8e6a3 100%);color:#fff;padding:10px 20px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.3);flex-shrink:0;}
.header h1{font-size:1.2rem;font-weight:900;letter-spacing:0.08em;text-shadow:0 2px 8px rgba(0,0,0,0.3);}

.main{display:flex;flex:1;overflow:hidden;}

.left-panel{width:40%;background:#eef6f6;display:flex;flex-direction:column;border-right:1px solid #e0e0e0;overflow:hidden;}
.left-panel h2{font-size:1rem;font-weight:700;padding:14px 16px 8px;color:#533483;flex-shrink:0;}
.form-area{padding:0 16px 16px;display:flex;flex-direction:column;gap:10px;flex:1;overflow-y:auto;}

.form-group{display:flex;flex-direction:column;gap:3px;}
.form-group label{font-size:0.82rem;font-weight:700;color:#444;}
.form-group input,.form-group select,.form-group textarea{border:2px solid #d0d0d0;border-radius:8px;padding:8px 10px;font-size:0.88rem;font-family:inherit;transition:border-color 0.2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#533483;box-shadow:0 0 0 2px rgba(83,52,131,0.15);}
.form-group textarea{resize:vertical;min-height:100px;}

/* ファイルアップロード */
.file-drop{border:2px dashed #bbb;border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all 0.2s;background:#fff;font-size:0.82rem;color:#888;}
.file-drop:hover,.file-drop.dragover{border-color:#533483;background:#f3e8ff;color:#533483;}
.file-drop input{display:none;}
.file-list{display:flex;flex-direction:column;gap:4px;margin-top:6px;}
.file-item{display:flex;align-items:center;gap:6px;background:#e8e8e8;border-radius:6px;padding:4px 8px;font-size:0.78rem;}
.file-item .remove-file{background:none;border:none;color:#e94560;cursor:pointer;font-weight:700;font-size:0.9rem;padding:0 4px;}

/* サンプルDLボタン */
.sample-dl-btn{display:inline-flex;align-items:center;gap:4px;background:#fff;color:#2563eb;border:2px solid #2563eb;border-radius:6px;padding:5px 10px;font-size:0.75rem;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:inherit;text-decoration:none;margin-top:6px;}
.sample-dl-btn:hover{background:#2563eb;color:#fff;}

.btn-area{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #e0e0e0;flex-shrink:0;background:#f0f0f0;}
.send-btn{flex:1;background:linear-gradient(135deg,#0f3460,#533483,#e94560);color:#fff;border:none;border-radius:10px;padding:12px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.send-btn:hover{box-shadow:0 4px 16px rgba(83,52,131,0.3);transform:translateY(-1px);}
.send-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.send-btn.inactive{background:#ccc;color:#333;}
.send-btn.inactive:hover{box-shadow:none;transform:none;}
.reset-btn{background:#fff;color:#666;border:2px solid #ccc;border-radius:10px;padding:12px 20px;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.reset-btn:hover{border-color:#e94560;color:#e94560;}

.right-panel{width:60%;display:flex;flex-direction:column;background:#fff;}
.right-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #eee;flex-shrink:0;background:#fafafa;}
.right-header h2{font-size:0.95rem;font-weight:700;color:#333;}
.right-actions{display:flex;gap:6px;flex-wrap:wrap;}
.right-actions button{background:#fff;border:2px solid #d0d0d0;border-radius:8px;padding:6px 14px;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:inherit;}
.right-actions button:hover{border-color:#533483;color:#533483;}
.right-actions button.copied{background:#10b981;color:#fff;border-color:#10b981;}
.word-btn{border-color:#2563eb !important;color:#2563eb !important;}
.word-btn:hover{background:#2563eb !important;color:#fff !important;}

.output-area{flex:1;overflow-y:auto;padding:16px;}
.output-content{font-size:0.9rem;line-height:1.8;color:#333;min-height:100px;}
.output-content .placeholder{color:#aaa;font-size:0.88rem;}

.loading{display:none;text-align:center;padding:40px;}
.loading.active{display:block;}
.spinner{width:36px;height:36px;border:4px solid #e0e0e0;border-top-color:#533483;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}

.action-bar{display:none;padding:10px 16px;border-top:1px solid #eee;background:#fafafa;gap:8px;flex-shrink:0;}
.action-bar.active{display:flex;}
.stop-btn{background:#fff;color:#e94560;border:2px solid #e94560;border-radius:10px;padding:12px 24px;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all 0.2s;display:none;}
.stop-btn:hover{background:#e94560;color:#fff;}
.stop-btn.visible{display:block;}
.retry-btn{flex:1;background:#fff;color:#f59e0b;border:2px solid #f59e0b;border-radius:10px;padding:12px 24px;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.retry-btn:hover{background:#f59e0b;color:#fff;}
.retry-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;}
.retry-modal.active{display:flex;}
.retry-modal-content{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:500px;box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.retry-modal-content h3{font-size:1rem;color:#333;margin-bottom:12px;}
.retry-modal-content textarea{width:100%;min-height:100px;border:2px solid #d0d0d0;border-radius:8px;padding:10px;font-size:0.9rem;font-family:inherit;resize:vertical;box-sizing:border-box;}
.retry-modal-content textarea:focus{outline:none;border-color:#f59e0b;}
.retry-modal-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;}
.retry-submit-btn{background:#f59e0b;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:0.9rem;font-weight:700;cursor:pointer;}
.retry-submit-btn:hover{background:#d97706;}
.retry-cancel-btn{background:#fff;color:#666;border:2px solid #ccc;border-radius:8px;padding:10px 24px;font-size:0.9rem;font-weight:700;cursor:pointer;}
.retry-cancel-btn:hover{border-color:#e94560;color:#e94560;}


.output-content h1{font-size:1.3rem;font-weight:900;margin:16px 0 8px;color:#1a1a2e;border-bottom:2px solid #533483;padding-bottom:4px;}
.output-content h2{font-size:1.15rem;font-weight:700;margin:14px 0 6px;color:#533483;}
.output-content h3{font-size:1.02rem;font-weight:700;margin:12px 0 4px;color:#0f3460;}
.output-content h4{font-size:0.95rem;font-weight:700;margin:10px 0 3px;color:#444;}
.output-content table{border-collapse:collapse;width:100%;margin:10px 0;font-size:0.85rem;}
.output-content th,.output-content td{border:1px solid #ccc;padding:7px 10px;text-align:left;}
.output-content th{background:#f0f0f5;font-weight:700;color:#333;}
.output-content td{background:#fff;}
.output-content tr:nth-child(even) td{background:#fafafa;}
.output-content hr{border:none;border-top:2px solid #533483;margin:14px 0;}
.output-content ul,.output-content ol{margin:6px 0 6px 20px;}
.output-content li{margin:2px 0;}
.output-content strong{font-weight:700;color:#1a1a2e;}
.output-content em{font-style:italic;}
.output-content code{background:#f0f0f5;padding:1px 5px;border-radius:4px;font-size:0.85em;font-family:monospace;}

@media(max-width:700px){
  .main{flex-direction:column;}
  .left-panel,.right-panel{width:100%;}
  .left-panel{max-height:50vh;border-right:none;border-bottom:1px solid #e0e0e0;}
  .right-panel{flex:1;}
  .header h1{font-size:1rem;}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<div class="header">
  <h1>問題と解答の作成</h1>
</div>

<div class="main">
  <div class="left-panel">
    <h2>入力項目</h2>
    <div class="form-area">
      <div class="form-group">
        <label>学年</label>
        <select id="grade">
          <option value="">選択してください</option>
          <option>小学校1年</option><option>小学校2年</option><option>小学校3年</option>
          <option>小学校4年</option><option>小学校5年</option><option>小学校6年</option>
          <option>中学1年</option><option>中学2年</option><option>中学3年</option>
          <option>高校1年</option><option>高校2年</option><option>高校3年</option>
        </select>
      </div>

      <div class="form-group">
        <label>科目</label>
        <select id="subject">
          <option value="">選択してください</option>
        </select>
      </div>

      <div class="form-group">
        <label>入力方法</label>
        <select id="inputMethod" onchange="toggleInputMethod()">
          <option value="text">テキストから問題作成</option>
          <option value="file">ファイルから問題作成</option>
        </select>
      </div>

      <div class="form-group" id="textInputGroup">
        <label>出題範囲のテキスト</label>
        <textarea id="textContent" placeholder="問題を作成したい範囲のテキストを貼り付けてください"></textarea>
      </div>

      <div class="form-group" id="fileInputGroup" style="display:none;">
        <label>ファイル添付</label>
        <div class="file-drop" id="fileDrop">
          ここにファイルをドラッグ＆ドロップ<br>またはクリックして選択
          <input type="file" id="fileInput" multiple accept=".pdf,.docx,.pptx,.xlsx,.csv,.txt,.jpg,.jpeg,.png">
        </div>
        <div class="file-list" id="fileList"></div>
        <a href="sampledata/sample3.txt" download target="_top" style="display:inline-block;margin-top:4px;font-size:0.7rem;color:#888;text-decoration:underline;cursor:pointer;">サンプルデータの例</a>
      </div>

    </div>
    <div class="btn-area">
      <button class="send-btn inactive" id="sendBtn" onclick="sendRequest()">送信する</button>
      <button class="reset-btn" onclick="resetForm()">リセット</button>
    </div>
  </div>

  <div class="right-panel">
    <div class="right-header">
      <h2>AI 出力</h2>
      <div class="right-actions">
        <button onclick="copyOutput()" id="copyBtn">コピー</button>
        <button onclick="saveOutput()">テキスト保存</button>
        <button class="word-btn" onclick="exportToWord()">Word出力</button>
      </div>
    </div>
    <div class="output-area" id="outputArea">
      <div class="output-content" id="outputContent">
        <span class="placeholder">左パネルで入力して「送信する」を押すと、ここに問題と解答が表示されます。</span>
      </div>
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>生成中...</p>
      </div>
    </div>
    <div class="action-bar" id="actionBar">
      <button class="retry-btn" id="retryBtn" onclick="showRetryPopup()" style="display:none">指示をして修正する</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'app3.php';
let uploadedFiles = [];
let outputText = '';
var currentUid = '';

// 学年→科目連動
var subjectsByLevel = {
  elementary: ['国語','算数','理科','社会','生活','音楽','図画工作','体育','道徳','外国語活動','外国語','総合的な学習の時間'],
  middle:     ['国語','数学','理科','社会','英語','音楽','美術','保健体育','技術・家庭','道徳','総合的な学習の時間'],
  high:       ['現代の国語','言語文化','論理国語','文学国語','古典探究','数学I','数学II','数学III','数学A','数学B','数学C','物理基礎','物理','化学基礎','化学','生物基礎','生物','地学基礎','地学','地理総合','地理探究','歴史総合','日本史探究','世界史探究','公共','政治・経済','倫理','英語コミュニケーションI','英語コミュニケーションII','英語コミュニケーションIII','論理・表現I','論理・表現II','論理・表現III','情報I','情報II','音楽','美術','保健体育','家庭','総合的な探究の時間']
};
function updateSubjects() {
  var grade = document.getElementById('grade').value;
  var sel = document.getElementById('subject');
  sel.innerHTML = '<option value="">選択してください</option>';
  var level = '';
  if (grade.startsWith('小学校')) level = 'elementary';
  else if (grade.startsWith('中学')) level = 'middle';
  else if (grade.startsWith('高校')) level = 'high';
  if (level) {
    subjectsByLevel[level].forEach(function(s) {
      var opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      sel.appendChild(opt);
    });
  }
  checkForm();
}
document.getElementById('grade').addEventListener('change', updateSubjects);

// 入力方法切替
function toggleInputMethod() {
  var method = document.getElementById('inputMethod').value;
  document.getElementById('textInputGroup').style.display = method === 'text' ? '' : 'none';
  document.getElementById('fileInputGroup').style.display = method === 'file' ? '' : 'none';
}

// ファイルアップロード
var fileDrop = document.getElementById('fileDrop');
var fileInput = document.getElementById('fileInput');
fileDrop.addEventListener('click', function() { fileInput.click(); });
fileDrop.addEventListener('dragover', function(e) { e.preventDefault(); fileDrop.classList.add('dragover'); });
fileDrop.addEventListener('dragleave', function() { fileDrop.classList.remove('dragover'); });
fileDrop.addEventListener('drop', function(e) { e.preventDefault(); fileDrop.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', function(e) { handleFiles(e.target.files); });


// pdf.js ワーカー設定
if (typeof pdfjsLib !== 'undefined') {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

// ブラウザ側PDFテキスト抽出
async function extractPdfTextBrowser(file) {
  try {
    var arrayBuffer = await file.arrayBuffer();
    var pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    var text = '';
    for (var i = 1; i <= pdf.numPages; i++) {
      var page = await pdf.getPage(i);
      var content = await page.getTextContent();
      var pageText = content.items.map(function(item) { return item.str; }).join('');
      text += pageText + '\n';
    }
    return text.trim();
  } catch (e) {
    console.error('PDF抽出エラー:', e);
    return '';
  }
}

function handleFiles(fileList) {
  for (var i = 0; i < fileList.length; i++) {
    var file = fileList[i];
    if (file.size > 20 * 1024 * 1024) { alert(file.name + ' は20MBを超えています'); continue; }
    (function(f) {
      var ext = f.name.split('.').pop().toLowerCase();
      if (ext === 'pdf' && typeof pdfjsLib !== 'undefined') {
        // PDFはブラウザ側でテキスト抽出
        extractPdfTextBrowser(f).then(function(pdfText) {
          var reader = new FileReader();
          reader.onload = function(e) {
            uploadedFiles.push({ name: f.name, mimeType: f.type || 'application/octet-stream', data: e.target.result.split(',')[1], pdfText: pdfText });
            renderFileList();
            checkForm();
          };
          reader.readAsDataURL(f);
        });
      } else {
        var reader = new FileReader();
        reader.onload = function(e) {
          uploadedFiles.push({ name: f.name, mimeType: f.type || 'application/octet-stream', data: e.target.result.split(',')[1] });
          renderFileList();
          checkForm();
        };
        reader.readAsDataURL(f);
      }
    })(file);
  }
}
function renderFileList() {
  document.getElementById('fileList').innerHTML = uploadedFiles.map(function(f, i) {
    return '<div class="file-item"><span>' + esc(f.name) + '</span><button class="remove-file" onclick="removeFile(' + i + ')">&times;</button></div>';
  }).join('');
}
function removeFile(idx) { uploadedFiles.splice(idx, 1); renderFileList(); checkForm(); }

// 送信
function sendRequest() {
  if (document.getElementById('sendBtn').classList.contains('inactive')) { alert('すべての項目を埋めてください'); return; }
  var grade = document.getElementById('grade').value;
  var subject = document.getElementById('subject').value;
  var method = document.getElementById('inputMethod').value;

  if (!grade) { alert('学年を選択してください'); return; }
  if (!subject) { alert('科目を入力してください'); return; }

  var message = '【学年】' + grade + '\n【科目】' + subject + '\n';

  if (method === 'text') {
    var textContent = document.getElementById('textContent').value.trim();
    if (!textContent) { alert('テキストを入力してください'); return; }
    message += '【出題範囲】\n' + textContent;
    outputText = '';
    document.getElementById('outputContent').innerHTML = '';
    doRequest({ message: message });
  } else {
    if (uploadedFiles.length === 0) { alert('ファイルを添付してください'); return; }
    var files = uploadedFiles.map(function(f) { return { mimeType: f.mimeType, data: f.data, pdfText: f.pdfText || '' }; });
    outputText = '';
    document.getElementById('outputContent').innerHTML = '';
    doRequest({ message: message, files: files });
  }
}

function showRetryPopup() {
  document.getElementById('retryModal').classList.add('active');
  document.getElementById('retryInstruction').value = '';
  setTimeout(function(){ document.getElementById('retryInstruction').focus(); }, 100);
}
function closeRetryPopup() {
  document.getElementById('retryModal').classList.remove('active');
}
function submitRetry() {
  var instruction = document.getElementById('retryInstruction').value.trim();
  if (!instruction) return;
  closeRetryPopup();
  outputText = '';
  document.getElementById('outputContent').innerHTML = '';
  doRequest({ utterance: instruction, uid: currentUid });
}


// API呼び出し（同期JSON）
async function doRequest(payload) {
  var sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  sendBtn.textContent = '生成中...';
  document.getElementById('actionBar').classList.add('active');
  document.getElementById('retryBtn').style.display = 'none';
  document.getElementById('loading').classList.add('active');
  try {
    var res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    document.getElementById('loading').classList.remove('active');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();
    if (data.ok) {
      currentUid = data.uid || '';
      outputText = data.answer;
      renderOutput();
      document.getElementById('retryBtn').style.display = 'block';
    } else {
      document.getElementById('outputContent').innerHTML = '<span style="color:red;">[エラー] ' + esc(data.error || '不明なエラー') + '</span>';
    }
  } catch (e) {
    document.getElementById('loading').classList.remove('active');
    document.getElementById('outputContent').innerHTML = '<span style="color:red;">エラー: ' + esc(e.message) + '</span>';
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = '送信する';
    var area = document.getElementById('outputArea');
    area.scrollTop = area.scrollHeight;
  }
}

function renderOutput() {
  var el = document.getElementById('outputContent');
  var cleaned = outputText.replace(/<br[^>]*>/gi, '\n');
  el.innerHTML = renderMarkdown(cleaned);
  var area = document.getElementById('outputArea');
  area.scrollTop = area.scrollHeight;
}

function renderMarkdown(text) {
  var lines = text.split('\n');
  var html = '';
  var inTable = false, inUl = false, inOl = false;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    if (line.trim().startsWith('|') && line.trim().endsWith('|')) {
      if (inUl) { html += '</ul>'; inUl = false; }
      if (inOl) { html += '</ol>'; inOl = false; }
      if (!inTable) {
        var nextLine = (i + 1 < lines.length) ? lines[i + 1].trim() : '';
        if (/^\|[\s\-:|]+\|$/.test(nextLine)) {
          inTable = true;
          html += '<table><thead><tr>';
          parseCells(line).forEach(function(c) { html += '<th>' + inline(esc(c)) + '</th>'; });
          html += '</tr></thead><tbody>';
          i++;
          continue;
        }
      }
      if (inTable) {
        html += '<tr>';
        parseCells(line).forEach(function(c) { html += '<td>' + inline(esc(c)) + '</td>'; });
        html += '</tr>';
        continue;
      }
    } else if (inTable) {
      html += '</tbody></table>';
      inTable = false;
    }

    if (line.startsWith('#### ')) {
      closeLists(); html += '<h4>' + inline(esc(line.slice(5))) + '</h4>'; continue;
    }
    if (line.startsWith('### ')) { closeLists(); html += '<h3>' + inline(esc(line.slice(4))) + '</h3>'; continue; }
    if (line.startsWith('## ')) { closeLists(); html += '<h2>' + inline(esc(line.slice(3))) + '</h2>'; continue; }
    if (line.startsWith('# ')) { closeLists(); html += '<h1>' + inline(esc(line.slice(2))) + '</h1>'; continue; }

    if (/^[━]{3,}$/.test(line.trim()) || /^[-]{3,}$/.test(line.trim()) || /^[_]{3,}$/.test(line.trim())) {
      closeLists(); html += '<hr>'; continue;
    }

    var ulMatch = line.match(/^[\s]*[-*・]\s+(.*)/);
    if (ulMatch) {
      if (inOl) { html += '</ol>'; inOl = false; }
      if (!inUl) { html += '<ul>'; inUl = true; }
      html += '<li>' + inline(esc(ulMatch[1])) + '</li>';
      continue;
    }

    var olMatch = line.match(/^[\s]*(\d+)[.．]\s+(.*)/);
    if (olMatch) {
      if (inUl) { html += '</ul>'; inUl = false; }
      if (!inOl) { html += '<ol>'; inOl = true; }
      html += '<li>' + inline(esc(olMatch[2])) + '</li>';
      continue;
    }

    if (inUl && line.trim() === '') { html += '</ul>'; inUl = false; }
    if (inOl && line.trim() === '') { html += '</ol>'; inOl = false; }

    if (line.trim() === '') {
      if (!(i > 0 && lines[i-1].trim() === '')) html += '<br>';
    } else { html += inline(esc(line)) + '<br>'; }
  }

  if (inTable) html += '</tbody></table>';
  if (inUl) html += '</ul>';
  if (inOl) html += '</ol>';
  return DOMPurify.sanitize(html);

  function closeLists() {
    if (inUl) { html += '</ul>'; inUl = false; }
    if (inOl) { html += '</ol>'; inOl = false; }
  }
}

function parseCells(line) { return line.split('|').slice(1, -1).map(function(c) { return c.trim(); }); }
function inline(text) {
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
  text = text.replace(/`(.+?)`/g, '<code>$1</code>');
  return text;
}
function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function stripMarkdown(s) {
    s = s.replace(/^#{1,6}\s+/gm, '');
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '$1');
    s = s.replace(/\*\*(.+?)\*\*/g, '$1');
    s = s.replace(/\*(.+?)\*/g, '$1');
    s = s.replace(/`([^`]+)`/g, '$1');
    return s;
}

function copyOutput() {
  if (!outputText) return;
  navigator.clipboard.writeText(outputText).then(function() {
    var btn = document.getElementById('copyBtn');
    btn.textContent = 'コピー済!';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
  });
}

function saveOutput() {
  if (!outputText) return;
  var blob = new Blob([outputText], { type: 'text/plain;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '問題と解答.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportToWord() {
  if (!outputText) return;
  var content = document.getElementById('outputContent').innerHTML;
  var wordHtml = '<!DOCTYPE html><html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><style>'
    + 'body{font-family:"Yu Gothic","Noto Sans JP",sans-serif;font-size:10.5pt;line-height:1.8;color:#333;}'
    + 'table{border-collapse:collapse;width:100%;margin:8px 0;}'
    + 'th,td{border:1px solid #333;padding:6px 10px;text-align:left;}'
    + 'th{background:#e8e8e8;font-weight:bold;}'
    + 'h1{font-size:18pt;margin:14px 0 6px;border-bottom:2px solid #333;padding-bottom:4px;}'
    + 'h2{font-size:14pt;margin:12px 0 5px;}'
    + 'h3{font-size:12pt;margin:10px 0 4px;}'
    + 'hr{border:none;border-top:2px solid #333;margin:12px 0;}'
    + 'ul,ol{margin:6px 0 6px 20px;}'
    + '</style></head><body>' + content + '</body></html>';
  var blob = new Blob(['\ufeff' + wordHtml], { type: 'application/msword' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '問題と解答.doc';
  a.click();
  URL.revokeObjectURL(a.href);
}

function resetForm() {
  document.getElementById('grade').value = '';
  document.getElementById('subject').innerHTML = '<option value="">選択してください</option>';
  document.getElementById('inputMethod').value = 'text';
  document.getElementById('textContent').value = '';
  toggleInputMethod();
  uploadedFiles = [];
  renderFileList();
  outputText = '';
  document.getElementById('outputContent').innerHTML = '<span class="placeholder">左パネルで入力して「送信する」を押すと、ここに問題と解答が表示されます。</span>';
  document.getElementById('actionBar').classList.remove('active');
  checkForm();
}

function checkForm() {
  var btn = document.getElementById('sendBtn');
  var ok = document.getElementById('grade').value
    && document.getElementById('subject').value
    && (document.getElementById('inputMethod').value === 'text'
      ? document.getElementById('textContent').value.trim()
      : uploadedFiles.length > 0);
  btn.classList.toggle('inactive', !ok);
}
document.getElementById('grade').addEventListener('change', checkForm);
document.getElementById('subject').addEventListener('change', checkForm);
document.getElementById('inputMethod').addEventListener('change', checkForm);
document.getElementById('textContent').addEventListener('input', checkForm);
</script>

    <h3>修正指示を入力</h3>
    <textarea id="retryInstruction" placeholder="修正してほしい内容を入力してください"></textarea>
    <div class="retry-modal-btns">
      <button class="retry-submit-btn" onclick="submitRetry()">修正する</button>
      <button class="retry-cancel-btn" onclick="closeRetryPopup()">キャンセル</button>
    </div>
  </div>
</div>
