<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="../images/favicon.ico" type="image/x-icon">
<title>AIチャット</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI','Helvetica Neue','Noto Sans JP',sans-serif;background:#f8f9fa;}

#app{display:flex;flex-direction:column;height:100%;}

/* ヘッダー */
.header{background:linear-gradient(to right,#3a8a9c 0%,#53b5ca 40%,#7dcfb6 75%,#a8e6a3 100%);color:#fff;padding:10px 20px;text-align:center;flex-shrink:0;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.header h1{font-size:1.15rem;font-weight:800;letter-spacing:0.08em;text-shadow:0 2px 8px rgba(0,0,0,0.3);}

/* チャットエリア */
#chatArea{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;min-height:0;background:#fff;}

.msg{max-width:75%;padding:10px 14px;border-radius:14px;font-size:0.9rem;line-height:1.7;word-wrap:break-word;animation:fadeIn 0.2s ease;}

.msg.user{align-self:flex-end;background:#533483;color:#fff;border-bottom-right-radius:4px;}
.msg.ai{align-self:flex-start;background:#f0f0f5;color:#333;border-bottom-left-radius:4px;border:1px solid #e0e0e0;}

/* AI吹き出し内のMarkdown */
.msg.ai h1,.msg.ai h2,.msg.ai h3{margin:8px 0 4px;font-weight:700;}
.msg.ai h1{font-size:1.1rem;color:#1a1a2e;border-bottom:2px solid #533483;padding-bottom:4px;}
.msg.ai h2{font-size:1.02rem;color:#533483;}
.msg.ai h3{font-size:0.95rem;color:#0f3460;}
.msg.ai p{margin:4px 0;}
.msg.ai ul,.msg.ai ol{margin:4px 0 4px 18px;}
.msg.ai li{margin:2px 0;}
.msg.ai strong{color:#533483;font-weight:700;}
.msg.ai code{background:#eef0f5;padding:1px 5px;border-radius:4px;font-size:0.84em;font-family:monospace;color:#0f3460;}
.msg.ai pre{background:#1a1a2e;padding:8px 10px;border-radius:8px;overflow-x:auto;margin:6px 0;font-size:0.84em;line-height:1.5;}
.msg.ai pre code{background:none;color:#e0e0e0;padding:0;}
.msg.ai table{border-collapse:collapse;width:100%;margin:6px 0;font-size:0.85rem;}
.msg.ai th,.msg.ai td{border:1px solid #ccc;padding:5px 8px;text-align:left;}
.msg.ai th{background:#f0f0f5;font-weight:700;color:#333;}

/* 添付プレビュー */
.msg .file-tag{display:inline-block;background:rgba(83,52,131,0.1);padding:2px 8px;border-radius:6px;font-size:0.78rem;margin-bottom:4px;color:#533483;}

/* 入力エリア */
#inputArea{padding:10px 16px;background:#f0f0f0;border-top:1px solid #e0e0e0;flex-shrink:0;}

/* 添付プレビューバー */
#attachBar{display:none;padding:0 0 8px;gap:6px;flex-wrap:wrap;}
#attachBar.active{display:flex;}
.attach-chip{display:flex;align-items:center;gap:4px;background:#fff;color:#555;padding:4px 10px;border-radius:8px;font-size:0.78rem;border:1px solid #d0d0d0;}
.attach-chip .remove{cursor:pointer;color:#e94560;font-weight:700;font-size:0.9rem;line-height:1;}

#inputRow{display:flex;gap:8px;align-items:flex-end;}

#fileBtn{background:#facc15;border:2px solid #1e293b;color:#1e293b;border-radius:10px;padding:9px 12px;cursor:pointer;font-size:0.85rem;font-weight:700;transition:all 0.2s;flex-shrink:0;font-family:inherit;}
#fileBtn:hover{background:#fde047;}

#msgInput{flex:1;border:2px solid #d0d0d0;border-radius:12px;padding:10px 14px;font-size:0.9rem;font-family:inherit;color:#333;background:#fff;resize:none;max-height:100px;line-height:1.5;outline:none;transition:border-color 0.2s;}
#msgInput:focus{border-color:#533483;box-shadow:0 0 0 2px rgba(83,52,131,0.15);}

#sendBtn{background:linear-gradient(135deg,#0f3460,#533483,#e94560);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s;flex-shrink:0;font-family:inherit;}
#sendBtn:hover{box-shadow:0 4px 16px rgba(83,52,131,0.3);transform:translateY(-1px);}
#sendBtn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

#clearBtn{background:#fff;color:#666;border:2px solid #ccc;border-radius:10px;padding:10px 14px;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.2s;flex-shrink:0;font-family:inherit;}
#clearBtn:hover{border-color:#e94560;color:#e94560;}

/* スクロールバー */
#chatArea::-webkit-scrollbar{width:6px;}
#chatArea::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ローディングスピナー（吹き出し内） */
.msg-spinner{display:inline-block;width:22px;height:22px;border:3px solid #d0d0d0;border-top-color:#533483;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* レスポンシブ */
@media(max-width:600px){
  .msg{max-width:88%;}
  #msgInput{font-size:0.85rem;}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<div id="app">
  <div class="header"><h1>AIチャット</h1></div>

  <div id="chatArea">
    <div class="msg ai">こんにちは、教員用AIです。何でも聞いて下さい。ファイルを添付して作業も可能です。</div>
  </div>

  <div id="inputArea">
    <div id="attachBar"></div>
  <a href="sampledata/sample1.txt" download target="_top" style="display:inline-block;margin-top:4px;font-size:0.7rem;color:#888;text-decoration:underline;cursor:pointer;">サンプルデータの例</a>
    <div id="inputRow">
      <button id="fileBtn" title="ファイル添付">添付</button>
      <input type="file" id="fileInput" multiple hidden>
      <textarea id="msgInput" rows="1" placeholder="メッセージを入力..."></textarea>
      <button id="sendBtn">送信</button>
      <button id="clearBtn">履歴クリア</button>
    </div>
  </div>
</div>

<script>
function stripMarkdown(s) {
    s = s.replace(/^#{1,6}\s+/gm, '');
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '$1');
    s = s.replace(/\*\*(.+?)\*\*/g, '$1');
    s = s.replace(/\*(.+?)\*/g, '$1');
    s = s.replace(/`([^`]+)`/g, '$1');
    return s;
}
marked.setOptions({ breaks: true, gfm: true });

const chatArea = document.getElementById('chatArea');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const clearBtn = document.getElementById('clearBtn');
const fileBtn = document.getElementById('fileBtn');
const fileInput = document.getElementById('fileInput');
const attachBar = document.getElementById('attachBar');

let currentUid = '';
let attachedFiles = []; // { name, base64, mimeType }
let isSending = false;

// テキストエリア自動リサイズ
msgInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// ファイル添付
fileBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async () => {
    for (const file of fileInput.files) {
        if (file.size > 10 * 1024 * 1024) {
            alert(file.name + ' は10MBを超えています。');
            continue;
        }
        const base64 = await fileToBase64(file);
        const ext = file.name.split('.').pop().toLowerCase();
        let pdfText = '';
        if (ext === 'pdf' && typeof pdfjsLib !== 'undefined') {
            pdfText = await extractPdfTextBrowser(file);
        }
        attachedFiles.push({ name: file.name, base64: base64, mimeType: file.type || 'application/octet-stream', pdfText: pdfText });
    }
    fileInput.value = '';
    renderAttachBar();
});


// pdf.js ワーカー設定
if (typeof pdfjsLib !== 'undefined') {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

// ブラウザ側PDFテキスト抽出
async function extractPdfTextBrowser(file) {
  try {
    var arrayBuffer = await file.arrayBuffer();
    var pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    var text = '';
    for (var i = 1; i <= pdf.numPages; i++) {
      var page = await pdf.getPage(i);
      var content = await page.getTextContent();
      var pageText = content.items.map(function(item) { return item.str; }).join('');
      text += pageText + '\n';
    }
    return text.trim();
  } catch (e) {
    console.error('PDF抽出エラー:', e);
    return '';
  }
}

function fileToBase64(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(file);
    });
}

function renderAttachBar() {
    if (attachedFiles.length === 0) {
        attachBar.classList.remove('active');
        attachBar.innerHTML = '';
        return;
    }
    attachBar.classList.add('active');
    attachBar.innerHTML = attachedFiles.map((f, i) =>
        '<div class="attach-chip"><span>' + escHtml(f.name) + '</span><span class="remove" data-idx="' + i + '">&times;</span></div>'
    ).join('');
    attachBar.querySelectorAll('.remove').forEach(el => {
        el.addEventListener('click', () => {
            attachedFiles.splice(parseInt(el.dataset.idx), 1);
            renderAttachBar();
        });
    });
}

// 送信
async function send() {
    const text = msgInput.value.trim();
    if ((!text && attachedFiles.length === 0) || isSending) return;

    isSending = true;
    sendBtn.disabled = true;

    // ユーザー吹き出し
    let userHtml = '';
    if (attachedFiles.length > 0) {
        userHtml += attachedFiles.map(f => '<div class="file-tag">&#128206; ' + escHtml(f.name) + '</div>').join(' ');
        if (text) userHtml += '<br>';
    }
    if (text) userHtml += escHtml(text);
    appendMsg('user', userHtml);

    // 送信データ構築
    var payload;
    if (!currentUid) {
        payload = {
            message: text,
            files: attachedFiles.map(f => ({ name: f.name, base64: f.base64, mimeType: f.mimeType, pdfText: f.pdfText || '' }))
        };
    } else {
        payload = { uid: currentUid, utterance: text };
    }

    // 入力クリア
    msgInput.value = '';
    msgInput.style.height = 'auto';
    attachedFiles = [];
    renderAttachBar();

    // AI吹き出し（スピナー表示）
    const aiEl = appendMsg('ai', '<span class="msg-spinner"></span>考え中...');

    try {
        const res = await fetch('app1.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error('HTTP ' + res.status);

        const data = await res.json();
        if (data.ok) {
            currentUid = data.uid || currentUid;
            aiEl.innerHTML = DOMPurify.sanitize(marked.parse(data.answer));
        } else {
            aiEl.textContent = '[エラー] ' + (data.error || '不明なエラー');
        }

    } catch (e) {
        aiEl.textContent = 'エラーが発生しました: ' + e.message;
    }

    scrollBottom();
    isSending = false;
    sendBtn.disabled = false;
    msgInput.focus();
}

function appendMsg(role, html) {
    const el = document.createElement('div');
    el.className = 'msg ' + role;
    el.innerHTML = html;
    chatArea.appendChild(el);
    scrollBottom();
    return el;
}

function scrollBottom() { chatArea.scrollTop = chatArea.scrollHeight; }

function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// イベント
sendBtn.addEventListener('click', send);
msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

clearBtn.addEventListener('click', () => {
    currentUid = '';
    chatArea.innerHTML = '<div class="msg ai">こんにちは、教員用AIです。何でも聞いて下さい。ファイルを添付して作業も可能です。</div>';
    msgInput.focus();
});
</script>
</body>
</html>
